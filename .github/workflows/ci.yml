name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts (forge fmt + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      FOUNDRY_PROFILE: default
      # When the RH_RPC secret is set, fork tests run against Robinhood Chain;
      # otherwise they self-skip via vm.skip.
      RH_RPC: ${{ secrets.RH_RPC }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test (unit + fuzz + invariant, fork when RH_RPC is set)
        run: forge test -vv

  scripts:
    name: Scripts (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
